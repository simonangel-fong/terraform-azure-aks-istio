apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: web-gateway
  namespace: default
spec:
  selector:
    istio: ingressgateway
  servers:
    # http
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "web.local"
      # redirect
      tls:
        httpsRedirect: true
    # https
    - port:
        number: 443
        name: https
        protocol: HTTPS
      hosts:
        - "web.local"
      tls:
        mode: SIMPLE
        credentialName: web-tls     # secret name
